# perpetual_pro — crypto perpetuals day-trading / scalping configuration

exchange:
  default: bybit
  auto_fallback: true
  fallback_exchanges:
    - bybit
    - binanceusdm
    - okx
    - bitget
    - mexc
    - bingx
    - bitmart
    - gate
    - htx
    - weex
  api_key: ""
  api_secret: ""
  password: ""
  enable_rate_limit: true
  timeout_ms: 30000
  sandbox: false

risk:
  # Prop account management defaults
  prop_mode: true
  # Simulated capital for position sizing (NOT a live exchange balance)
  simulated_capital: 1000.0
  # Risk per trade clamped to [risk_per_trade_min_pct, risk_per_trade_max_pct] in prop mode
  risk_per_trade_pct: 1.0
  risk_per_trade_min_pct: 0.5
  risk_per_trade_max_pct: 1.0
  daily_drawdown_warn_pct: 3.0
  max_open_risk_pct: 2.0
  # Prop max leverage 5x
  max_leverage: 5
  leverage_ceiling: 5.0
  leverage_floor: 1.0
  min_rr: 1.2
  # Tight stops for scalps / day trades
  default_stop_atr_mult: 1.0
  # TP1–TP4: realistic short-term targets (ATR multiples)
  default_tp_atr_mults: [0.7, 1.3, 2.0, 3.0]

# Telegram alert policy (credentials NEVER go here — use env only):
#   TELEGRAM_BOT_TOKEN
#   TELEGRAM_CHAT_ID
# Optional: TELEGRAM_ENABLED=1 to force-enable when credentials are set
telegram:
  # enabled is auto-true when both env credentials are present (see load_config)
  min_llm_confidence: 65
  min_rank_score: 50
  parse_mode: "HTML"
  notify_on_empty: false

# Auto watchlist scans at best WAT windows (credentials via env above)
scheduler:
  enabled: true
  timezone: "Africa/Lagos"   # WAT
  times:
    - "05:00"
    - "16:00"
    - "20:00"
  watchlist: []          # empty → built-in default coins
  exchange: bybit
  timeframe: "15m"
  no_news: false
  only_prop_safe: true

# Pure day-trade stack: 15m execution, 1h drive, 4h confirmation
timeframes:
  primary: "15m"
  higher:
    - "1h"
    - "4h"
  ohlcv_limit: 500
  # Reuse live market data for five minutes and bound concurrent public requests.
  cache_ttl_seconds: 300
  fetch_workers: 4

analysis:
  rsi_period: 14
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  atr_period: 14
  ema_fast: 9
  ema_mid: 21
  ema_slow: 50
  ema_trend: 200
  # Intraday confluence: EMA/Supertrend, momentum, structure, and 15m/1h/4h
  # alignment carry most of the score. News is context, never a primary trigger.
  weights:
    trend: 0.17
    momentum: 0.18
    structure: 0.17
    multi_tf: 0.16
    volume: 0.11
    derivatives: 0.10
    volatility: 0.07
    patterns: 0.03
    news: 0.01
  min_confidence: 15
  max_confidence: 92

news:
  enabled: true
  cryptopanic_token: ""
  max_articles: 12
  # Prefer headlines from the last 1–4 hours (hard filter when timestamps exist)
  lookback_hours: 4
  bullish_keywords:
    - approval
    - etf
    - inflow
    - partnership
    - adoption
    - upgrade
    - bullish
    - rally
    - listing
    - institutional
  bearish_keywords:
    - hack
    - exploit
    - lawsuit
    - ban
    - sec
    - crash
    - liquidat
    - delist
    - fraud
    - outage
    - investigation

llm:
  enabled: true
  groq_api_key: ""
  gemini_api_key: ""
  groq_model: "llama-3.1-8b-instant"
  gemini_model: "gemini-2.0-flash"
  timeout_s: 25

ocr:
  engine: dual
  tesseract_cmd: ""
  languages:
    - en
  easyocr_gpu: false
  min_confidence: 0.35

screen:
  default_mode: interactive
  dark_theme: true
  save_capture: true
  annotate: true
  output_dir: "./output"

vision:
  use_ollama: true
  ollama_base_url: "http://127.0.0.1:11434"
  ollama_model: "llava"
  ollama_timeout_s: 45

output:
  save_markdown: true
  save_json: true
  output_dir: "./output"
  show_disclaimer: true

logging:
  level: INFO
  file: "./logs/perpetual_pro.log"
  rotation: "10 MB"
  retention: "14 days"
