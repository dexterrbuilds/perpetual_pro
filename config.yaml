# perpetual_pro — crypto perpetuals day-trading / scalping configuration

exchange:
  default: bybit
  auto_fallback: true
  fallback_exchanges:
    - bybit
    - binanceusdm
    - okx
    - bitget
    - mexc
    - bingx
    - bitmart
    - gate
    - htx
    - weex
  api_key: ""
  api_secret: ""
  password: ""
  enable_rate_limit: true
  timeout_ms: 30000
  sandbox: false

risk:
  # Simulated capital for position sizing (NOT a live exchange balance)
  simulated_capital: 1000.0
  risk_per_trade_pct: 1.0
  # Aggressive perp leverage (always ≥20x)
  leverage_ceiling: 100.0
  leverage_floor: 20.0
  min_rr: 1.2
  # Tight stops for scalps / day trades
  default_stop_atr_mult: 1.0
  # TP1–TP4: realistic short-term targets (ATR multiples)
  default_tp_atr_mults: [0.7, 1.3, 2.0, 3.0]

# Day-trade stack: 5m + 15m primary, 1h drive, 4h confirmation only
timeframes:
  primary: "15m"
  higher:
    - "5m"
    - "1h"
    - "4h"
  ohlcv_limit: 500

analysis:
  rsi_period: 14
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  atr_period: 14
  ema_fast: 9
  ema_mid: 21
  ema_slow: 50
  ema_trend: 200
  # Short-term weighted confluence (sums ≈ 1.0)
  # Favor momentum, volume, funding, micro-structure over HTF swing narrative
  weights:
    momentum: 0.20
    derivatives: 0.16
    structure: 0.14
    volume: 0.12
    multi_tf: 0.12
    patterns: 0.10
    trend: 0.10
    news: 0.06
  min_confidence: 15
  max_confidence: 92

news:
  enabled: true
  cryptopanic_token: ""
  max_articles: 12
  # Prefer headlines from the last 1–4 hours (hard filter when timestamps exist)
  lookback_hours: 4
  bullish_keywords:
    - approval
    - etf
    - inflow
    - partnership
    - adoption
    - upgrade
    - bullish
    - rally
    - listing
    - institutional
  bearish_keywords:
    - hack
    - exploit
    - lawsuit
    - ban
    - sec
    - crash
    - liquidat
    - delist
    - fraud
    - outage
    - investigation

llm:
  enabled: true
  groq_api_key: ""
  gemini_api_key: ""
  groq_model: "llama-3.1-8b-instant"
  gemini_model: "gemini-2.0-flash"
  timeout_s: 25

ocr:
  engine: dual
  tesseract_cmd: ""
  languages:
    - en
  easyocr_gpu: false
  min_confidence: 0.35

screen:
  default_mode: interactive
  dark_theme: true
  save_capture: true
  annotate: true
  output_dir: "./output"

vision:
  use_ollama: true
  ollama_base_url: "http://127.0.0.1:11434"
  ollama_model: "llava"
  ollama_timeout_s: 45

output:
  save_markdown: true
  save_json: true
  output_dir: "./output"
  show_disclaimer: true

logging:
  level: INFO
  file: "./logs/perpetual_pro.log"
  rotation: "10 MB"
  retention: "14 days"
