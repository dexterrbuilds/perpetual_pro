# perpetual_pro configuration

exchange:
  default: binanceusdm
  api_key: ""
  api_secret: ""
  password: ""
  enable_rate_limit: true
  timeout_ms: 30000
  sandbox: false

risk:
  # Simulated capital for position sizing (NOT a live exchange balance)
  simulated_capital: 1000.0
  risk_per_trade_pct: 1.0
  leverage_ceiling: 20.0   # max suggested dynamic leverage
  leverage_floor: 1.0
  min_rr: 1.5
  default_stop_atr_mult: 1.5
  default_tp_atr_mults: [1.5, 2.5, 4.0]

timeframes:
  primary: "15m"
  higher:
    - "5m"
    - "1h"
    - "4h"
    - "1d"
  ohlcv_limit: 1000

analysis:
  rsi_period: 14
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  atr_period: 14
  ema_fast: 9
  ema_mid: 21
  ema_slow: 50
  ema_trend: 200
  weights:
    trend: 0.18
    momentum: 0.14
    structure: 0.16
    patterns: 0.12
    derivatives: 0.12
    multi_tf: 0.14
    volume: 0.08
    news: 0.06
  min_confidence: 15
  max_confidence: 92

news:
  enabled: true
  cryptopanic_token: ""
  max_articles: 12
  lookback_hours: 24
  bullish_keywords:
    - approval
    - etf
    - inflow
    - partnership
    - adoption
    - upgrade
    - bullish
    - rally
    - listing
    - institutional
  bearish_keywords:
    - hack
    - exploit
    - lawsuit
    - ban
    - sec
    - crash
    - liquidat
    - delist
    - fraud
    - outage
    - investigation

llm:
  enabled: true
  # Prefer env: GROQ_API_KEY / GEMINI_API_KEY
  groq_api_key: ""
  gemini_api_key: ""
  groq_model: "llama-3.1-8b-instant"
  gemini_model: "gemini-2.0-flash"
  timeout_s: 25

ocr:
  engine: dual
  tesseract_cmd: ""
  languages:
    - en
  easyocr_gpu: false
  min_confidence: 0.35

screen:
  default_mode: interactive
  dark_theme: true
  save_capture: true
  annotate: true
  output_dir: "./output"

vision:
  use_ollama: true
  ollama_base_url: "http://127.0.0.1:11434"
  ollama_model: "llava"
  ollama_timeout_s: 45

output:
  save_markdown: true
  save_json: true
  output_dir: "./output"
  show_disclaimer: true

logging:
  level: INFO
  file: "./logs/perpetual_pro.log"
  rotation: "10 MB"
  retention: "14 days"
