<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Perpetual Pro — Side Panel</title>
    <link rel="stylesheet" href="shared/styles.css" />
    <script src="lib/tesseract.min.js"></script>
  </head>
  <body class="sidepanel">
    <header class="app-header">
      <div class="brand">
        <img src="icons/icon48.png" alt="" width="28" height="28" />
        <div>
          <h1>Perpetual Pro</h1>
          <div class="sub">Full report · side panel</div>
        </div>
      </div>
    </header>

    <div class="status-bar" role="status" aria-live="polite">
      <span id="statusDot" class="status-dot"></span>
      <span id="statusText">Ready</span>
    </div>

    <div class="controls">
      <div class="btn-row">
        <button id="btnCapture" class="primary" type="button" title="Capture full visible tab and analyze">
          Capture &amp; Analyze
        </button>
      </div>
      <div class="btn-row">
        <button id="btnSelectArea" type="button" title="Drag-select chart region">Select area</button>
        <button id="btnRefresh" type="button" title="Refresh status and last report">Refresh</button>
        <button id="btnClear" type="button" title="Clear everything">Clear</button>
      </div>
      <p class="hint">Full tab by default · pair from TradingView URL when possible</p>
      <div class="field-row">
        <label class="field">
          Symbol override
          <input
            id="symbol"
            type="text"
            placeholder="Blank = auto-detect"
            autocomplete="off"
            spellcheck="false"
            title="Optional for this capture only"
          />
        </label>
        <label class="field">
          Timeframe
          <input id="timeframe" type="text" placeholder="auto / 15m" autocomplete="off" />
        </label>
      </div>
      <div id="thumbWrap" class="thumb-wrap" hidden>
        <div class="thumb-label">Captured chart</div>
        <img id="thumb" class="thumb" alt="Capture preview" />
      </div>
    </div>

    <div id="errorBanner" class="error-banner" role="alert"></div>
    <div id="successBanner" class="success-banner" role="status"></div>

    <div id="loading" class="loading">
      <div class="spinner"></div>
      <div id="loadingText">Analyzing…</div>
      <div class="loading-steps" id="loadingSteps">OCR · live data · confluence</div>
    </div>

    <div id="results" class="results"></div>

    <script type="module" src="sidepanel.js"></script>
  </body>
</html>
